<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favor Não Pedir Música - O Jogo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

<script>
// --- VARIÁVEIS GLOBAIS ---
let dj;
let obstacles = [];
let collectibles = [];
let lives = 2;
let score = 0;
let gameSpeed = 12;
let baseGameSpeed = 12;
let cursorX = -50;
let cursorSpeed = 5.5;
let successfulCollections = 0;
let levelUpMessage = 0;
let gameState = "START"; 
let somColisao;

// Variáveis de Mídia
let imgBg, imgObs, imgStartTitle, imgControlBox, imgPlayBtn, imgCursor;
let imgFaixa1, imgFaixa2, imgFaixa3, imgElemento4;
let imgGoodRequests = [];
let fonteClarendon;

const badRequests = ["MÚSICA", "Toca aquela?", "Pendrive?", "Anitta?"];
const goodRequests = ["Água", "A conta", "Cerveja", "Toalha"];

function preload() {
    // 1. CARREGAMENTO DA FONTE
    fonteClarendon = loadFont('Clarendon_-Regular.ttf');
    
    // 2. CARREGAMENTO DE ÁUDIO
    soundFormats('mp3', 'ogg');
    somColisao = loadSound('caralho.mp3');

    // 3. CARREGAMENTO DE IMAGENS (Com os nomes e formatos exatos)
    imgStartTitle = loadImage('FNPM-Logo_ocpsets.webp');
    imgControlBox = loadImage('box_bottom_FNPM.webp');
    imgPlayBtn = loadImage('Play-botao_FNPM.webp');
    imgObs = loadImage('OBS_FNPM.png');
    imgBg = loadImage('BG_FNPM.png');
    imgCursor = loadImage('cursor.png');
    imgFaixa1 = loadImage('faixa1.png');
    imgFaixa2 = loadImage('faixa2.png');
    imgFaixa3 = loadImage('faixa3.png');
    imgElemento4 = loadImage('elemento4.png');
    
    // 4. CARREGAMENTO DE IMAGENS DE BOM REQUESTS (Good Collectibles)
    imgGoodRequests.push(loadImage('agua.png'));
    imgGoodRequests.push(loadImage('cerveja.png'));
    imgGoodRequests.push(loadImage('toalha.png'));
    imgGoodRequests.push(loadImage('aconta.png')); 
}

function setup() {
    createCanvas(800, 400);
    textAlign(CENTER, CENTER);
    rectMode(CENTER);
    imageMode(CENTER);
    
    // Aplica a Clarendon para todo o projeto
    textFont(fonteClarendon);
    
    dj = new DJ();
}

function draw() {
    if (gameState === "START") {
        drawStartScreen();
    } else if (gameState === "PLAYING") {
        playGame();
    } else if (gameState === "GAMEOVER") {
        drawGameOverScreen();
    }
}

// --- CONTROLES BLINDADOS ---
function mousePressed() {
    if (!dj) return; 

    if (gameState === "START") {
        // Play button positioned at (680, 350) with dynamically scaled dimensions
        let playX = 680;
        let playY = 350;
        let playW = imgPlayBtn && imgPlayBtn.width ? imgPlayBtn.width * 0.8 : 104;
        let playH = imgPlayBtn && imgPlayBtn.height ? imgPlayBtn.height * 0.8 : 60;
        
        if (mouseX > playX - playW/2 && mouseX < playX + playW/2 && 
            mouseY > playY - playH/2 && mouseY < playY + playH/2) {
            gameState = "PLAYING";
        }
    } else if (gameState === "PLAYING") {
        dj.jump();
    } else if (gameState === "GAMEOVER") {
        resetGame();
    }
}

function keyPressed() {
    if (!dj) return;

    if (gameState === "START" && key === ' ') gameState = "PLAYING";
    else if (gameState === "PLAYING" && keyCode === UP_ARROW) dj.subir();
    else if (gameState === "PLAYING" && keyCode === DOWN_ARROW) dj.descer();
    else if (gameState === "GAMEOVER" && key === ' ') resetGame();
}

// --- TELAS ---
function drawStartScreen() {
    // Background Image
    if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background("#FCEFB4");
    }

    // Define scaling factors based on image dimensions (preserved)
    let scaleFactor1 = 1.0; // faixa1 (São Paulo banner)
    let scaleFactor2 = 1.1; // faixa2 (OCP SETS blue banner)
    let scaleFactor3 = 0.95; // faixa3 (OCP SETS box)
    let scaleFactorTitle = 0.9; // FNPM-Logo
    let scaleFactorElem = 0.85; // elemento4 (meter)
    let scaleFactorBtn = 0.8; // Play button

    // Distributed Window Layout (like a DAW audio interface)
    
    // Window 1: São Paulo banner (Top-Left, floating panel)
    if (imgFaixa1 && imgFaixa1.width) {
        image(imgFaixa1, 80, 50, imgFaixa1.width * scaleFactor1, imgFaixa1.height * scaleFactor1);
    }

    // Window 2: Central Title (Top-Center, prominent window)
    if (imgStartTitle && imgStartTitle.width) {
        image(imgStartTitle, 400, 75, imgStartTitle.width * scaleFactorTitle, imgStartTitle.height * scaleFactorTitle);
    }

    // Window 3: OCP SETS Box (Top-Right, floating panel)
    if (imgFaixa3 && imgFaixa3.width) {
        image(imgFaixa3, 720, 50, imgFaixa3.width * scaleFactor3, imgFaixa3.height * scaleFactor3);
    }

    // Window 4: Vertical Meter/Fader (Left-Middle, tall panel)
    if (imgElemento4 && imgElemento4.width) {
        image(imgElemento4, 50, 200, imgElemento4.width * scaleFactorElem, imgElemento4.height * scaleFactorElem);
    }

    // Window 5: OCP SETS Banner (Center-Middle, large floating window)
    if (imgFaixa2 && imgFaixa2.width) {
        image(imgFaixa2, 400, 220, imgFaixa2.width * scaleFactor2, imgFaixa2.height * scaleFactor2);
    }

    // Window 6: Control Box (Bottom-Right corner)
    if (imgControlBox && imgControlBox.width) {
        image(imgControlBox, 600, 310, imgControlBox.width * 0.7, imgControlBox.height * 0.7);
    }

    // Window 7: Play Button (Bottom-Right, inside control area)
    if (imgPlayBtn && imgPlayBtn.width) {
        image(imgPlayBtn, 680, 350, imgPlayBtn.width * scaleFactorBtn, imgPlayBtn.height * scaleFactorBtn);
    }
}

function playGame() {
    // Cenário Listrado
    if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background(20);
    }

    // --- CONTROLES DINÂMICOS DE VELOCIDADE ---
    if (keyIsDown(RIGHT_ARROW)) {
        gameSpeed = lerp(gameSpeed, 15, 0.1);
    } else if (keyIsDown(LEFT_ARROW)) {
        gameSpeed = lerp(gameSpeed, 3, 0.1);
    } else {
        gameSpeed = lerp(gameSpeed, baseGameSpeed, 0.05);
    }

    // Lógica de Spawn com Dificuldade Progressiva
    let spawnInterval = max(12, 40 - floor(score / 400));
    if (frameCount % spawnInterval === 0) {
        if (random(1) < 0.6) obstacles.push(new Obstacle());
        else collectibles.push(new Collectible());
    }

    // Coletáveis (Água, Conta)
    for (let i = collectibles.length - 1; i >= 0; i--) {
        collectibles[i].move();
        collectibles[i].show();
        if (dj.hits(collectibles[i])) {
            score += 100;
            dj.grow();
            successfulCollections++;
            
            // Verificação de Dificuldade Progressiva (a cada 5 coletas)
            if (successfulCollections % 5 === 0) {
                gameSpeed += 1.2;
                cursorSpeed += 0.5;
                levelUpMessage = 120; // Exibir por 120 frames (~2 segundos)
            }
            
            collectibles.splice(i, 1);
        } else if (collectibles[i].x < -50) collectibles.splice(i, 1);
    }

    // Obstáculos (Música)
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].move();
        obstacles[i].show();
        if (dj.hits(obstacles[i]) && !dj.isInvulnerable) {
            lives--;
            dj.takeDamage();
            if (somColisao && somColisao.isLoaded()) somColisao.play();
            obstacles.splice(i, 1);
            if (lives <= 0) gameState = "GAMEOVER";
        } else if (obstacles[i].x < -50) {
            score += 10; 
            obstacles.splice(i, 1);
        }
    }

    dj.update();
    dj.show();

    // --- CURSOR VISUAL DISTRACTION (Animated Playback Head) ---
    cursorX += cursorSpeed;
    if (cursorX > width) cursorX = -50;
    
    if (imgCursor) {
        tint(255, 200);
        image(imgCursor, cursorX, height / 2, 10, height);
        noTint();
    } else {
        fill(255, 0, 0, 200);
        rect(cursorX, height / 2, 10, height);
    }

    // Placar e Vidas
    fill(255);
    textSize(22);
    textAlign(LEFT, TOP);
    text(`PONTOS: ${score}`, 20, 20);
    textAlign(RIGHT, TOP);
    text(`VIDAS: ${lives}`, width - 20, 20);
    textAlign(CENTER, CENTER);
}

function drawGameOverScreen() {
    background("#4A1504");
    fill(255);
    textSize(40);
    text("A FITA ACABOU", width / 2, height / 2 - 40);
    textSize(20);
    fill("#FCEFB4");
    text(`Pontuação Final: ${score}`, width / 2, height / 2 + 10);
    textSize(16);
    fill(200);
    text("Pressione ESPAÇO ou TOQUE para rebobinar", width / 2, height / 2 + 60);
}

function resetGame() {
    dj = new DJ();
    obstacles = [];
    collectibles = [];
    score = 0;
    lives = 2;
    gameSpeed = 12;
    cursorX = -50;
    cursorSpeed = 5.5;
    successfulCollections = 0;
    levelUpMessage = 0;
    gameState = "PLAYING";
}

// --- CLASSES ---
class DJ {
    constructor() {
        this.baseSize = 60; 
        this.r = this.baseSize;
        this.x = 120;
        this.andaresY = [height - 50, height - 160, height - 270];
        this.andarAtual = 0;
        this.y = this.andaresY[this.andarAtual];
        this.isInvulnerable = false;
        this.invulnerableTimer = 0;
        this.scaleMult = 1;
    }
    subir() { if (this.andarAtual < 2) this.andarAtual++; }
    descer() { if (this.andarAtual > 0) this.andarAtual--; }
    update() {
        this.y = lerp(this.y, this.andaresY[this.andarAtual], 0.2);
        if (this.isInvulnerable) {
            this.invulnerableTimer--;
            if (this.invulnerableTimer <= 0) this.isInvulnerable = false;
        }
    }
    grow() {
        this.scaleMult = min(this.scaleMult + 0.05, 1.5);
        this.r = this.baseSize * this.scaleMult;
    }
    takeDamage() {
        this.isInvulnerable = true;
        this.invulnerableTimer = 60;
        this.scaleMult = 1;
        this.r = this.baseSize;
    }
    hits(entity) {
        let distance = dist(this.x, this.y, entity.x, entity.y);
        return distance < (this.r / 2 + entity.size / 2);
    }
    show() {
        if (this.isInvulnerable && frameCount % 10 < 5) return;
        
        fill('#FFFFFF'); 
        rect(this.x, this.y, this.r, this.r);
        fill('#000000');
        textSize(18); // Fonte um pouco maior pro DJ
        text("DJ", this.x, this.y);
    }
}

class Obstacle {
    constructor() {
        this.size = 70;
        this.x = width;
        let andarSorteado = floor(random(3));
        this.y = dj.andaresY[andarSorteado];
    }
    move() { this.x -= gameSpeed; }
    show() {
        if (imgObs) {
            image(imgObs, this.x, this.y, this.size * 3.5, this.size * 1.3);
        }
    }
}

class Collectible {
    constructor() {
        this.size = 70;
        this.x = width;
        let andarSorteado = floor(random(3));
        this.y = dj.andaresY[andarSorteado];
        this.img = random(imgGoodRequests);
    }
    move() { this.x -= gameSpeed; }
    show() {
        if (this.img) {
            image(this.img, this.x, this.y, this.size * 3.5, this.size * 1.3);
        }
    }
}
</script>

</body>
</html>
