<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favor Não Pedir Música - O Jogo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            /* Mantém a proporção 16:9 e deixa espaço superior/inferior */
            --vpad: 96px; /* espaço total vertical (top + bottom) */
            width: calc(min(100vw, (100vh - var(--vpad)) * 16 / 9));
            height: auto;
            max-height: calc(100vh - var(--vpad));
            display: block;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

<script>
// --- VARIÁVEIS GLOBAIS ---
let dj;
let obstacles = [];
let collectibles = [];
let lives = 2;
let score = 0;
let gameSpeed = 12;
let baseGameSpeed = 12;
let cursorX = -50;
let cursorSpeed = 5.5;
let successfulCollections = 0;
let levelUpMessage = 0;
let gameState = "LOGIN";
let somColisao;
// Player / Login / Ranking
let player = { name: '', email: '' };
let playerNameInput, playerEmailInput, loginBtnElement;
let scoreSaved = false;
// Coordenadas do botão de ranking na Start Screen (detect click)
let startRankingX = 0, startRankingY = 0, startRankingW = 0, startRankingH = 0;
let rankingBackX = 0, rankingBackY = 0, rankingBackW = 0, rankingBackH = 0;
let rankingPlayX = 0, rankingPlayY = 0, rankingPlayW = 0, rankingPlayH = 0;
let rankingLogoutX = 0, rankingLogoutY = 0, rankingLogoutW = 0, rankingLogoutH = 0;
// Posição e dimensões do botão Play na tela de START (calculadas dinamicamente)
let startPlayX = 0;
let startPlayY = 0;
let startPlayW = 0;
let startPlayH = 0;

// Ajustes de dificuldade / spawn
let obstacleSpeedMultiplier = 0.9; // reduz ligeiramente a velocidade dos pedidos (obstáculos)
let collectibleSpeedMultiplier = 1.0; // multiplicador para coletáveis
let obstacleProbability = 0.7; // chance de spawn ser um obstáculo (aumenta dificuldade)
let minSpawnInterval = 8; // intervalo mínimo entre spawns (em frames)
let baseSpawnInterval = 28; // valor base usado para calcular o intervalo de spawn

// Variáveis de Mídia
let imgBg, imgObs, imgStartTitle, imgControlBox, imgPlayBtn, imgCursor;
let imgFaixa1, imgFaixa2, imgFaixa3, imgElemento4;
let imgDedo, imgStartScreen;
let imgGoodRequests = [];
let fonteClarendon;

const badRequests = ["MÚSICA", "Toca aquela?", "Pendrive?", "Anitta?"];
const goodRequests = ["Água", "A conta", "Cerveja", "Toalha"];

function preload() {
    // 1. CARREGAMENTO DA FONTE
    fonteClarendon = loadFont('Clarendon_-Regular.ttf');
    
    // 2. CARREGAMENTO DE ÁUDIO
    soundFormats('mp3', 'ogg');
    somColisao = loadSound('caralho.mp3');

    // 3. CARREGAMENTO DO DJ (dedo)
    imgDedo = loadImage('dedo.png');

    // 3. CARREGAMENTO DE IMAGENS (Com os nomes e formatos exatos)
    imgStartTitle = loadImage('FNPM-Logo_ocpsets.webp');
    imgControlBox = loadImage('box_bottom_FNPM.webp');
    imgPlayBtn = loadImage('Play-botao_FNPM.webp');
    imgObs = loadImage('OBS_FNPM.png');
    imgBg = loadImage('BG_FNPM.png');
    imgCursor = loadImage('cursor.png');
    imgFaixa1 = loadImage('faixa1.png');
    imgFaixa2 = loadImage('faixa2.png');
    imgFaixa3 = loadImage('faixa3.png');
    imgElemento4 = loadImage('elemento4.png');
    
    // 4. CARREGAMENTO DE IMAGENS DE BOM REQUESTS (Good Collectibles)
    imgGoodRequests.push(loadImage('agua.png'));
    imgGoodRequests.push(loadImage('cerveja.png'));
    imgGoodRequests.push(loadImage('toalha.png'));
    imgGoodRequests.push(loadImage('aconta.png'));

    // 5. CARREGAMENTO DE START SCREEN
    imgStartScreen = loadImage('start_screen.png'); 
}

function setup() {
    createCanvas(1920, 1080);
    textAlign(CENTER, CENTER);
    rectMode(CENTER);
    imageMode(CENTER);
    
    // Aplica a Clarendon para todo o projeto
    textFont(fonteClarendon);
    
    dj = new DJ();

    // --- CRIA ELEMENTOS DO FORM DE LOGIN (DOM) ---
    playerNameInput = document.createElement('input');
    playerNameInput.placeholder = 'Nome do jogador';
    playerNameInput.id = 'playerNameInput';
    Object.assign(playerNameInput.style, {
        position: 'absolute',
        display: 'none',
        zIndex: 9999,
        padding: '10px',
        fontSize: '16px',
        borderRadius: '6px',
        border: 'none',
        outline: 'none',
        boxShadow: '0 4px 12px rgba(0,0,0,0.5)'
    });
    document.body.appendChild(playerNameInput);

    playerEmailInput = document.createElement('input');
    playerEmailInput.placeholder = 'Email (opcional)';
    playerEmailInput.id = 'playerEmailInput';
    Object.assign(playerEmailInput.style, {
        position: 'absolute',
        display: 'none',
        zIndex: 9999,
        padding: '10px',
        fontSize: '16px',
        borderRadius: '6px',
        border: 'none',
        outline: 'none',
        boxShadow: '0 4px 12px rgba(0,0,0,0.5)'
    });
    document.body.appendChild(playerEmailInput);

    loginBtnElement = document.createElement('button');
    loginBtnElement.innerText = 'Entrar';
    Object.assign(loginBtnElement.style, {
        position: 'absolute',
        display: 'none',
        zIndex: 9999,
        padding: '10px 16px',
        fontSize: '16px',
        borderRadius: '6px',
        border: 'none',
        cursor: 'pointer',
        background: '#FCEFB4'
    });
    loginBtnElement.onclick = function() {
        let name = (playerNameInput.value || '').trim();
        if (!name) {
            alert('Por favor digite seu nome.');
            return;
        }
        player.name = name;
        player.email = (playerEmailInput.value || '').trim();
        savePlayerToStorage();
        playerNameInput.value = '';
        playerEmailInput.value = '';
        hideLoginUI();
        gameState = 'START';
    };
    document.body.appendChild(loginBtnElement);

    // Atualiza posição dos elementos quando a janela for redimensionada
    window.addEventListener('resize', updateLoginUIPosition);

    // Carrega jogador salvo, caso exista
    loadPlayerFromStorage();
    if (player && player.name) {
        gameState = 'START';
        hideLoginUI();
    } else {
        gameState = 'LOGIN';
        showLoginUI();
    }
}

function draw() {
    if (gameState === "LOGIN") {
        drawLoginScreen();
    } else if (gameState === "START") {
        drawStartScreen();
    } else if (gameState === "PLAYING") {
        playGame();
    } else if (gameState === "RANKING") {
        drawRankingScreen();
    } else if (gameState === "GAMEOVER") {
        drawGameOverScreen();
    }
}

// --- CONTROLES BLINDADOS ---
function mousePressed() {
    if (!dj) return; 

    if (gameState === "START") {
        // Usa as dimensões calculadas em `drawStartScreen` para detectar clique no Play
        let playX = startPlayX || (width * 0.88);
        let playY = startPlayY || (height * 0.9);
        let playW = startPlayW || (imgPlayBtn && imgPlayBtn.width ? imgPlayBtn.width * 0.8 : 104);
        let playH = startPlayH || (imgPlayBtn && imgPlayBtn.height ? imgPlayBtn.height * 0.8 : 60);

        // Ranking button (fallback caso não esteja calculado)
        let rankX = startRankingX || (width * 0.12);
        let rankY = startRankingY || (height * 0.9);
        let rankW = startRankingW || (width * 0.14);
        let rankH = startRankingH || (height * 0.06);

        if (mouseX > playX - playW/2 && mouseX < playX + playW/2 &&
            mouseY > playY - playH/2 && mouseY < playY + playH/2) {
            gameState = "PLAYING";
            return;
        }

        if (mouseX > rankX - rankW/2 && mouseX < rankX + rankW/2 &&
            mouseY > rankY - rankH/2 && mouseY < rankY + rankH/2) {
            // mostra ranking
            gameState = "RANKING";
            return;
        }
    } else if (gameState === "PLAYING") {
        dj.jump();
    } else if (gameState === "RANKING") {
        // Detecta cliques em Voltar, Logout ou Jogar Novamente
        let backX = rankingBackX || (width * 0.25);
        let backY = rankingBackY || (height * 0.87);
        let backW = rankingBackW || (width * 0.16);
        let backH = rankingBackH || Math.max(40, height * 0.06);

        let logoutX = rankingLogoutX || (width * 0.5);
        let logoutY = rankingLogoutY || backY;
        let logoutW = rankingLogoutW || backW;
        let logoutH = rankingLogoutH || backH;

        let playX = rankingPlayX || (width * 0.75);
        let playY = rankingPlayY || backY;
        let playW = rankingPlayW || backW;
        let playH = rankingPlayH || backH;

        if (mouseX > backX - backW/2 && mouseX < backX + backW/2 &&
            mouseY > backY - backH/2 && mouseY < backY + backH/2) {
            gameState = "START";
            return;
        }

        if (mouseX > logoutX - logoutW/2 && mouseX < logoutX + logoutW/2 &&
            mouseY > logoutY - logoutH/2 && mouseY < logoutY + logoutH/2) {
            // Trocar jogador (logout)
            player = { name: '', email: '' };
            localStorage.removeItem('fnpm_player');
            gameState = "LOGIN";
            return;
        }

        if (mouseX > playX - playW/2 && mouseX < playX + playW/2 &&
            mouseY > playY - playH/2 && mouseY < playY + playH/2) {
            resetGame();
            return;
        }
    } else if (gameState === "GAMEOVER") {
        resetGame();
    }
}

function keyPressed() {
    if (!dj) return;

    if (gameState === "LOGIN" && key === 'Enter') {
        let name = (playerNameInput.value || '').trim();
        if (!name) {
            alert('Por favor digite seu nome.');
            return;
        }
        player.name = name;
        player.email = (playerEmailInput.value || '').trim();
        savePlayerToStorage();
        hideLoginUI();
        gameState = 'START';
    } else if (gameState === "START" && key === ' ') gameState = "PLAYING";
    else if (gameState === "PLAYING" && keyCode === UP_ARROW) dj.subir();
    else if (gameState === "PLAYING" && keyCode === DOWN_ARROW) dj.descer();
    else if (gameState === "RANKING" && key === ' ') {
        resetGame();
    } else if (gameState === "GAMEOVER" && key === ' ') resetGame();
}

// --- TELAS ---
function drawStartScreen() {
    // Start Screen Background
    if (imgStartScreen) {
        imageMode(CORNER);
        image(imgStartScreen, 0, 0, width, height);
        imageMode(CENTER);
    } else if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background("#FCEFB4");
    }

    let w = width;
    let h = height;

    // Defina as áreas clicáveis/interativas sobre a imagem
    // Botão PLAY (ajuste conforme a posição na sua imagem)
    startPlayX = w * 0.5;
    startPlayY = h * 0.72;
    startPlayW = w * 0.15;
    startPlayH = h * 0.12;

    // Botão RANKING (canto inferior esquerdo)
    startRankingX = w * 0.12;
    startRankingY = h * 0.9;
    startRankingW = w * 0.14;
    startRankingH = h * 0.06;

    // Exibe inputs de login mapeados sobre a imagem
    if (!player || !player.name) {
        showLoginUI();
        updateLoginUIPosition();
    } else {
        hideLoginUI();
    }
}

function playGame() {
    // Cenário Listrado
    if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background(20);
    }

    // --- CONTROLES DINÂMICOS DE VELOCIDADE ---
    if (keyIsDown(RIGHT_ARROW)) {
        gameSpeed = lerp(gameSpeed, 15, 0.1);
    } else if (keyIsDown(LEFT_ARROW)) {
        gameSpeed = lerp(gameSpeed, 3, 0.1);
    } else {
        gameSpeed = lerp(gameSpeed, baseGameSpeed, 0.05);
    }

    // Lógica de Spawn com Dificuldade Progressiva
    // Spawn mais frequente conforme a pontuação, e maior probabilidade de obstáculos
    let spawnInterval = max(minSpawnInterval, baseSpawnInterval - floor(score / 300));
    if (frameCount % spawnInterval === 0) {
        if (random(1) < obstacleProbability) obstacles.push(new Obstacle());
        else collectibles.push(new Collectible());
    }

    // Coletáveis (Água, Conta)
    for (let i = collectibles.length - 1; i >= 0; i--) {
        collectibles[i].move();
        collectibles[i].show();
        if (dj.hits(collectibles[i])) {
            score += 100;
            dj.grow();
            successfulCollections++;
            
            // Verificação de Dificuldade Progressiva (a cada 5 coletas)
            if (successfulCollections % 5 === 0) {
                gameSpeed += 1.2;
                cursorSpeed += 0.5;
                levelUpMessage = 120; // Exibir por 120 frames (~2 segundos)
            }
            
            collectibles.splice(i, 1);
        } else if (collectibles[i].x < -50) collectibles.splice(i, 1);
    }

    // Obstáculos (Música)
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].move();
        obstacles[i].show();
        if (dj.hits(obstacles[i]) && !dj.isInvulnerable) {
            lives--;
            dj.takeDamage();
            if (somColisao && somColisao.isLoaded()) somColisao.play();
            obstacles.splice(i, 1);
            if (lives <= 0) {
                saveScoreToRanking();
                gameState = "RANKING";
            }
        } else if (obstacles[i].x < -50) {
            score += 10; 
            obstacles.splice(i, 1);
        }
    }

    dj.update();
    dj.show();

    // --- CURSOR VISUAL DISTRACTION (Animated Playback Head) ---
    cursorX += cursorSpeed;
    if (cursorX > width) cursorX = -50;
    
    if (imgCursor) {
        tint(255, 200);
        image(imgCursor, cursorX, height / 2, 10, height);
        noTint();
    } else {
        fill(255, 0, 0, 200);
        rect(cursorX, height / 2, 10, height);
    }

    // Placar e Vidas
    fill(255);
    textSize(22);
    textAlign(LEFT, TOP);
    text(`PONTOS: ${score}`, 20, 20);
    textAlign(RIGHT, TOP);
    text(`VIDAS: ${lives}`, width - 20, 20);
    textAlign(CENTER, CENTER);
}

function drawGameOverScreen() {
    background("#4A1504");
    fill(255);
    textSize(40);
    text("A FITA ACABOU", width / 2, height / 2 - 40);
    textSize(20);
    fill("#FCEFB4");
    text(`Pontuação Final: ${score}`, width / 2, height / 2 + 10);
    textSize(16);
    fill(200);
    text("Pressione ESPAÇO ou TOQUE para rebobinar", width / 2, height / 2 + 60);
}

// --- LOGIN / RANKING UTILITIES ---
function showLoginUI() {
    if (!playerNameInput || !playerEmailInput || !loginBtnElement) return;
    playerNameInput.style.display = 'block';
    playerEmailInput.style.display = 'block';
    loginBtnElement.style.display = 'block';
    updateLoginUIPosition();
}

function hideLoginUI() {
    if (!playerNameInput || !playerEmailInput || !loginBtnElement) return;
    playerNameInput.style.display = 'none';
    playerEmailInput.style.display = 'none';
    loginBtnElement.style.display = 'none';
}

function updateLoginUIPosition() {
    const cnv = document.querySelector('canvas');
    if (!cnv) return;
    const rect = cnv.getBoundingClientRect();
    
    // MAPEAMENTO DOS CAMPOS DE LOGIN NA IMAGEM START_SCREEN
    // Ajuste as proporções baseado na sua imagem específica
    
    // Posição do campo Nome (ex: 30% de largura, 60% de altura)
    const nameInputW = Math.min(400, rect.width * 0.35);
    const nameInputX = rect.left + (rect.width * 0.32);
    const nameInputY = rect.top + (rect.height * 0.62);

    playerNameInput.style.width = nameInputW + 'px';
    playerNameInput.style.left = nameInputX + 'px';
    playerNameInput.style.top = nameInputY + 'px';

    // Posição do campo Email (ex: 30% de largura, 72% de altura)
    const emailInputW = Math.min(400, rect.width * 0.35);
    const emailInputX = rect.left + (rect.width * 0.32);
    const emailInputY = rect.top + (rect.height * 0.72);

    playerEmailInput.style.width = emailInputW + 'px';
    playerEmailInput.style.left = emailInputX + 'px';
    playerEmailInput.style.top = emailInputY + 'px';

    // Posição do botão Entrar
    loginBtnElement.style.width = '140px';
    loginBtnElement.style.left = (nameInputX + (nameInputW - 140) / 2) + 'px';
    loginBtnElement.style.top = (emailInputY + 54) + 'px';
}

function loadPlayerFromStorage() {
    try {
        const p = localStorage.getItem('fnpm_player');
        if (p) player = JSON.parse(p);
    } catch (e) {
        // ignore
    }
}

function savePlayerToStorage() {
    try {
        localStorage.setItem('fnpm_player', JSON.stringify(player));
    } catch (e) {}
}

function getRankingFromStorage() {
    try {
        const r = localStorage.getItem('fnpm_ranking');
        return r ? JSON.parse(r) : [];
    } catch (e) { return []; }
}

function saveScoreToRanking() {
    if (!player || !player.name) return;
    let ranking = getRankingFromStorage();
    ranking.push({ name: player.name, score: score || 0 });
    ranking.sort((a, b) => b.score - a.score);
    ranking = ranking.slice(0, 50);
    try { localStorage.setItem('fnpm_ranking', JSON.stringify(ranking)); } catch (e) {}
    scoreSaved = true;
}

function drawLoginScreen() {
    if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background('#111');
    }
    fill(255);
    textSize(36);
    textAlign(CENTER, CENTER);
    text('Entre para jogar', width/2, height * 0.16);
    textSize(16);
    fill(200);
    text('Digite seu nome e email (opcional)', width/2, height * 0.22);
    showLoginUI();
    updateLoginUIPosition();
}

function drawRankingScreen() {
    if (imgBg) {
        imageMode(CORNER);
        image(imgBg, 0, 0, width, height);
        imageMode(CENTER);
    } else {
        background(20);
    }
    // garante que o formulário esteja escondido
    hideLoginUI();

    fill(255);
    textSize(48);
    textAlign(CENTER, CENTER);
    text('RANKING', width/2, height * 0.08);

    // Exibe jogador atual
    fill(200);
    textSize(20);
    text(`Jogador: ${player.name}`, width/2, height * 0.15);

    let ranking = getRankingFromStorage();
    textSize(22);
    let startY = height * 0.22;
    let rowH = Math.min(44, height * 0.06);
    for (let i = 0; i < ranking.length && i < 10; i++) {
        let p = ranking[i];
        let y = startY + i * (rowH + 4);
        
        // Destaca o jogador atual
        if (p.name === player.name && p.score === score) {
            fill('#FCEFB4');
            textSize(24);
        } else {
            fill(255);
            textSize(22);
        }
        text(`${i+1}. ${p.name} — ${p.score}`, width/2, y);
    }

    // Botões Voltar, Logout e Jogar Novamente
    let btnW = width * 0.16;
    let btnH = Math.max(40, height * 0.06);
    let btnY = height * 0.87;
    
    // Botão Voltar (esquerda)
    let backX = width * 0.25;
    fill('#FCEFB4'); rect(backX, btnY, btnW, btnH, 8);
    fill('#111'); textSize(16); text('Voltar', backX, btnY);
    rankingBackX = backX; rankingBackY = btnY; rankingBackW = btnW; rankingBackH = btnH;

    // Botão Logout (centro)
    let logoutX = width * 0.5;
    fill('#FF6B6B'); rect(logoutX, btnY, btnW, btnH, 8);
    fill('#FFF'); textSize(16); text('Trocar Jogador', logoutX, btnY);
    rankingLogoutX = logoutX; rankingLogoutY = btnY; rankingLogoutW = btnW; rankingLogoutH = btnH;
    
    // Botão Jogar Novamente (direita)
    let playX = width * 0.75;
    fill('#6BCB77'); rect(playX, btnY, btnW, btnH, 8);
    fill('#FFF'); textSize(16); text('Jogar Novamente', playX, btnY);
    rankingPlayX = playX; rankingPlayY = btnY; rankingPlayW = btnW; rankingPlayH = btnH;
}

function resetGame() {
    dj = new DJ();
    obstacles = [];
    collectibles = [];
    score = 0;
    lives = 2;
    gameSpeed = 12;
    cursorX = -50;
    cursorSpeed = 5.5;
    successfulCollections = 0;
    levelUpMessage = 0;
    gameState = "PLAYING";
}

// --- CLASSES ---
class DJ {
    constructor() {
        // tamanho base proporcional à altura do canvas (escala responsiva)
        this.baseSize = floor(height * 0.2);
        this.r = this.baseSize;
        this.x = width * 0.06;
        // andares posicionados proporcionalmente a partir da base
        this.andaresY = [
            height - floor(height * 0.046),
            height - floor(height * 0.148),
            height - floor(height * 0.25)
        ];
        this.andarAtual = 0;
        this.y = this.andaresY[this.andarAtual];
        this.isInvulnerable = false;
        this.invulnerableTimer = 0;
        this.scaleMult = 1;
    }
    subir() { if (this.andarAtual < 2) this.andarAtual++; }
    descer() { if (this.andarAtual > 0) this.andarAtual--; }
    update() {
        this.y = lerp(this.y, this.andaresY[this.andarAtual], 0.2);
        if (this.isInvulnerable) {
            this.invulnerableTimer--;
            if (this.invulnerableTimer <= 0) this.isInvulnerable = false;
        }
    }
    grow() {
        this.scaleMult = min(this.scaleMult + 0.05, 1.5);
        this.r = this.baseSize * this.scaleMult;
    }
    takeDamage() {
        this.isInvulnerable = true;
        this.invulnerableTimer = 60;
        this.scaleMult = 1;
        this.r = this.baseSize;
    }
    hits(entity) {
        let distance = dist(this.x, this.y, entity.x, entity.y);
        // Considera a largura da imagem ao calcular o raio de colisão (preserva proporção)
        let halfHeight = this.r / 2;
        let halfWidth = (imgDedo && imgDedo.width && imgDedo.height) ? (this.r * imgDedo.width / imgDedo.height) / 2 : halfHeight;
        let effectiveRadius = max(halfHeight, halfWidth);
        // usa tamanho exibido do entity quando disponível (definido em show()), senão usa entity.size
        let entityRadius = (entity.displayHeight ? max(entity.displayHeight, entity.displayWidth || 0) : entity.size) / 2;
        return distance < (effectiveRadius + entityRadius);
    }
    show() {
        if (this.isInvulnerable && frameCount % 10 < 5) return;
        if (imgDedo) {
            imageMode(CENTER);
            // Usa this.r como altura desejada e preserva proporção da imagem
            let dispH = this.r;
            let dispW = (imgDedo.width && imgDedo.height) ? dispH * (imgDedo.width / imgDedo.height) : dispH;
            image(imgDedo, this.x, this.y, dispW, dispH);
        } else {
            fill('#FFFFFF');
            rect(this.x, this.y, this.r, this.r);
            fill('#000000');
            textSize(18);
            text("DJ", this.x, this.y);
        }
    }
}

class Obstacle {
    constructor() {
        // tamanho proporcional à altura do canvas
        this.size = floor(height * 0.18);
        this.x = width;
        let andarSorteado = floor(random(3));
        this.y = dj.andaresY[andarSorteado];
        this.displayWidth = this.size;
        this.displayHeight = this.size;
    }
    move() { this.x -= gameSpeed * obstacleSpeedMultiplier; }
    show() {
        if (imgObs) {
            // desenha preservando proporção da imagem
            let dispH = this.size * 1.1;
            let dispW = (imgObs.width && imgObs.height) ? dispH * (imgObs.width / imgObs.height) : dispH;
            this.displayWidth = dispW;
            this.displayHeight = dispH;
            image(imgObs, this.x, this.y, dispW, dispH);
        }
    }
}

class Collectible {
    constructor() {
        this.size = floor(height * 0.18);
        this.x = width;
        let andarSorteado = floor(random(3));
        this.y = dj.andaresY[andarSorteado];
        this.img = random(imgGoodRequests);
        this.displayWidth = this.size;
        this.displayHeight = this.size;
    }
    move() { this.x -= gameSpeed * collectibleSpeedMultiplier; }
    show() {
        if (this.img) {
            let dispH = this.size * 1.0;
            let dispW = (this.img.width && this.img.height) ? dispH * (this.img.width / this.img.height) : dispH;
            this.displayWidth = dispW;
            this.displayHeight = dispH;
            image(this.img, this.x, this.y, dispW, dispH);
        }
    }
}
